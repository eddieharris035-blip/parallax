<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Parallax Hub — Profile Icon</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #070714;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .icon-frame {
      width: 800px;
      height: 800px;
      background: #15152a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 100px rgba(255, 204, 128, 0.2);
    }

    /* Starfield background */
    .icon-frame::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(2px 2px at 18% 22%, rgba(255,255,255,0.85), transparent 3px),
        radial-gradient(2px 2px at 82% 33%, rgba(255,255,255,0.55), transparent 3px),
        radial-gradient(2px 2px at 45% 75%, rgba(255,255,255,0.65), transparent 3px),
        radial-gradient(2px 2px at 68% 85%, rgba(255,255,255,0.40), transparent 3px),
        radial-gradient(3px 3px at 25% 65%, rgba(255,220,180,0.55), transparent 3px),
        radial-gradient(2px 2px at 72% 19%, rgba(180,220,255,0.40), transparent 3px),
        radial-gradient(2px 2px at 15% 90%, rgba(255,255,255,0.45), transparent 3px),
        radial-gradient(2px 2px at 90% 68%, rgba(200,200,255,0.35), transparent 3px);
      background-size: 600px 600px;
      opacity: 0.9;
    }

    /* Warm glow */
    .icon-frame::after {
      content: "";
      position: absolute;
      top: -10%; right: -15%;
      width: 70%; height: 70%;
      background: radial-gradient(circle, rgba(255, 204, 128, 0.25), transparent 65%);
      filter: blur(25px);
      pointer-events: none;
    }

    /* The planet */
    .planet {
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%,
        #ffe0b3 0%,
        #ffcc80 15%,
        #ff9933 50%,
        #994d1a 100%);
      box-shadow:
        inset -24px -24px 60px rgba(0,0,0,0.55),
        0 0 80px rgba(255, 153, 51, 0.4);
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="icon-frame">
    <div class="planet"></div>
  </div>
</body>
</html>
