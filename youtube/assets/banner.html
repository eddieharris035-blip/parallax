<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Parallax Hub — Banner</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Auto-fit the banner to the browser window while keeping the
       true 2560x1440 render (YouTube minimum). We use CSS scale so
       a simple window screenshot captures the full banner. */
    .banner-wrap {
      width: 2560px;
      height: 1440px;
      transform: scale(var(--scale, 0.5));
      transform-origin: center center;
    }

    /* 2560 x 1440 — YouTube standard banner, safe-zone aware */
    .banner {
      width: 2560px;
      height: 1440px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #070714 0%, #0d0d20 50%, #15152a 100%);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    }

    /* Starfield */
    .banner::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        radial-gradient(2px 2px at 8% 14%, rgba(255,255,255,0.85), transparent 3px),
        radial-gradient(2px 2px at 87% 28%, rgba(255,255,255,0.55), transparent 3px),
        radial-gradient(2px 2px at 40% 68%, rgba(255,255,255,0.65), transparent 3px),
        radial-gradient(2px 2px at 72% 88%, rgba(255,255,255,0.40), transparent 3px),
        radial-gradient(3px 3px at 22% 50%, rgba(255,220,180,0.45), transparent 3px),
        radial-gradient(2px 2px at 62% 18%, rgba(180,220,255,0.50), transparent 3px),
        radial-gradient(2px 2px at 12% 82%, rgba(255,255,255,0.45), transparent 3px),
        radial-gradient(2px 2px at 92% 62%, rgba(200,200,255,0.35), transparent 3px),
        radial-gradient(2px 2px at 33% 28%, rgba(255,255,255,0.6), transparent 3px),
        radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,0.35), transparent 3px);
      background-repeat: repeat;
      background-size: 480px 480px;
      opacity: 0.9;
    }

    /* Warm ambient glow, top-right */
    .banner::after {
      content: "";
      position: absolute;
      top: -20%; right: -10%;
      width: 60%; height: 80%;
      background: radial-gradient(circle, rgba(255, 204, 128, 0.22), transparent 60%);
      filter: blur(50px);
      pointer-events: none;
    }

    /* Content — inside YouTube's safe zone:
       Mobile-safe area is roughly 1235x338 centered vertically */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .brand {
      font-size: 220px;
      color: #f7f7fb;
      letter-spacing: -0.02em;
      line-height: 1;
      font-weight: 500;
      text-shadow: 0 4px 40px rgba(255, 204, 128, 0.15);
    }

    .tagline {
      font-size: 56px;
      color: #ffcc80;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .schedule {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 28px;
      color: #868699;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 20px;
    }

    /* Small planet on the right side of the brand */
    .planet-accent {
      position: absolute;
      right: 18%;
      top: 30%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%,
        #ffe0b3 0%,
        #ffcc80 15%,
        #ff9933 50%,
        #994d1a 100%);
      box-shadow:
        inset -14px -14px 40px rgba(0,0,0,0.55),
        0 0 60px rgba(255, 153, 51, 0.3);
      z-index: 1;
      opacity: 0.85;
    }

    /* Small secondary planet on the left */
    .planet-accent-2 {
      position: absolute;
      left: 16%;
      top: 60%;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        #a8d4ff 0%,
        #2f74c4 50%,
        #0d1f4c 100%);
      box-shadow: inset -10px -10px 30px rgba(0,0,0,0.6);
      z-index: 1;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="planet-accent"></div>
    <div class="planet-accent-2"></div>
    <div class="content">
      <div class="brand">Parallax Hub</div>
      <div class="tagline">Curiosity, calculated.</div>
      <div class="schedule">New videos every Saturday</div>
    </div>
  </div>
</body>
</html>
